spec_version: 1
name: code_migration_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

# openenv.yaml
version: 0.1.0
description: "Agent migrates code across languages/frameworks with deterministic grading"
author: "Your Name"
license: "MIT"

tasks:
  - id: "python_modernize"
    difficulty: "easy"
    description: "Migrate Python 3.8 script to Python 3.12 idioms (match/case, pathlib, type hints)"
    source_lang: "python"
    target_lang: "python"
    requirements: "Use structural pattern matching, pathlib.Path, explicit type hints"
    test_desc: "Tests validate functional equivalence + modern syntax usage"
    required_idioms:
      - "match "
      - "case "
      - "Path("
      - "->"
      - ": str"
    grader: "syntax_check + test_run + idiom_match"
    
  - id: "python_to_node"
    difficulty: "medium"
    description: "Convert Python requests script to Node.js fetch with async/await"
    source_lang: "python"
    target_lang: "javascript"
    requirements: "Use async/await, fetch API, query-parameter construction, JSON parsing, and explicit error handling."
    test_desc: "Validates fetch behavior, query string handling, headers, JSON parsing, and error propagation."
    required_idioms:
      - "async function"
      - "await fetch("
      - "response.ok"
      - "response.json("
      - "URL("
    grader: "syntax_check + test_run + idiom_match"

  - id: "pandas_to_polars_advanced"
    difficulty: "hard"
    description: "Migrate pandas DataFrame pipeline to Polars lazy evaluation"
    source_lang: "python"
    target_lang: "python"
    requirements: "Migrate to Polars LazyFrame. Handle: null filling with group median, rolling window aggregation, string normalization, multi-column groupby aggregations, no pandas usage."
    test_desc: "Validates output correctness, window logic, filtering, aggregation, and Polars usage"
    required_idioms:
      - "pl.scan_csv"
      - "with_columns"
      - ".collect()"
      - "pl.col"
      - ".over("
    grader: "syntax_check + test_run + idiom_match + resource_check"

graders:
  syntax_check:
    type: "programmatic"
    weight: 0.3
  test_run:
    type: "programmatic"
    weight: 0.5
    timeout: 2.0
  idiom_match:
    type: "keyword_overlap"
    weight: 0.4
  resource_check:
    type: "programmatic"
    weight: 0.3
    only_for: ["pandas_to_polars"]
